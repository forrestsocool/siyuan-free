version: "3.9"

services:
  main:
    image: ${SIYUAN_IMAGE}
    command: ["--workspace=/siyuan/workspace/", "--accessAuthCode=${SIYUAN_ACCESS_AUTH_CODE}"]
    ports:
      - "${SIYUAN_PORT}:6806"
    volumes:
      - ${SIYUAN_WORKSPACE}:/siyuan/workspace
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}

  siyuan-extra:
    image: ${SIYUAN_EXTRA_IMAGE}
    ports:
      - "${SIYUAN_EXTRA_PORT}:6810"
    volumes:
      - ${SIYUAN_WORKSPACE}:/siyuan/workspace:ro
      - siyuan-extra-data:/data
    restart: unless-stopped
    depends_on:
      - main
    environment:
      SIYUAN_URL: http://main:6806
      SIYUAN_TOKEN: ${SIYUAN_TOKEN}
      ASSETS_DIR: /siyuan/workspace/data/assets
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PREFIX: ${S3_PREFIX}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      ASSET_PUBLIC_BASE: ${ASSET_PUBLIC_BASE}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
      WECHAT_WEBHOOK_TYPE: ${WECHAT_WEBHOOK_TYPE}
      REMINDER_INTERVAL_SECONDS: ${REMINDER_INTERVAL_SECONDS}
      ASSET_SCAN_INTERVAL_SECONDS: ${ASSET_SCAN_INTERVAL_SECONDS}

volumes:
  siyuan-extra-data:
