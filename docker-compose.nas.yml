version: "3.9"

services:
  main:
    image: ghcr.io/forrestsocool/siyuan-free:codex-unlock-extra-services
    command: ["--workspace=/siyuan/workspace/", "--accessAuthCode=siyuan1896"]
    ports:
      - "6806:6806"
    volumes:
      - /share/Container/siyuan/workspace:/siyuan/workspace
    restart: unless-stopped
    environment:
      TZ: "Asia/Shanghai"
      PUID: "1000"
      PGID: "100"

  siyuan-extra:
    image: ghcr.io/forrestsocool/siyuan-extra:codex-unlock-extra-services
    ports:
      - "6810:6810"
    volumes:
      - /share/Container/siyuan/workspace:/siyuan/workspace:ro
      - siyuan-extra-data:/data
    restart: unless-stopped
    depends_on:
      - main
    environment:
      SIYUAN_URL: "http://main:6806"
      SIYUAN_TOKEN: "${SIYUAN_TOKEN:-}"
      ASSETS_DIR: "/siyuan/workspace/data/assets"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-auto}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_PREFIX: "${S3_PREFIX:-siyuan-assets}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      ASSET_PUBLIC_BASE: "${ASSET_PUBLIC_BASE:-}"
      WECHAT_WEBHOOK_URL: "${WECHAT_WEBHOOK_URL:-}"
      WECHAT_WEBHOOK_TYPE: "${WECHAT_WEBHOOK_TYPE:-work_wechat}"
      REMINDER_INTERVAL_SECONDS: "${REMINDER_INTERVAL_SECONDS:-60}"
      ASSET_SCAN_INTERVAL_SECONDS: "${ASSET_SCAN_INTERVAL_SECONDS:-300}"

volumes:
  siyuan-extra-data:
