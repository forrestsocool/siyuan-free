name: Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - "codex/**"
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          ref="${GITHUB_REF_NAME//\//-}"
          echo "SIYUAN_IMAGE=ghcr.io/${repo}" >> "$GITHUB_ENV"
          echo "EXTRA_IMAGE=ghcr.io/${owner}/siyuan-extra" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${ref}" >> "$GITHUB_ENV"
          {
            echo "SIYUAN_TAGS<<EOF"
            echo "ghcr.io/${repo}:${ref}"
            if [[ "$GITHUB_REF_NAME" == "main" || "$GITHUB_REF_NAME" == "master" || "$GITHUB_REF_TYPE" == "tag" ]]; then
              echo "ghcr.io/${repo}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
          {
            echo "EXTRA_TAGS<<EOF"
            echo "ghcr.io/${owner}/siyuan-extra:${ref}"
            if [[ "$GITHUB_REF_NAME" == "main" || "$GITHUB_REF_NAME" == "master" || "$GITHUB_REF_TYPE" == "tag" ]]; then
              echo "ghcr.io/${owner}/siyuan-extra:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SiYuan image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.SIYUAN_TAGS }}

      - name: Build and push extra sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./extra
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.EXTRA_TAGS }}
